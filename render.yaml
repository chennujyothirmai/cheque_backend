services:
  - type: web
    name: bank-cheque-verification
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn chequeprojet.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
